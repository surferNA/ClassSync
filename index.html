<!DOCTYPE html>
<html>
<head>
    <title>ClassSync Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<header>
    <h1>ClassSync Dashboard</h1>
    <p>Your personal study control center</p>
</header>

<div class="container">

    <div class="card">
        <h2>Timetable</h2>
        <p>Manage your daily class schedule.</p>
        <button onclick="openTimetable()">Open</button>
    </div>

    <div class="card">
        <h2>Assignments</h2>
        <p>Track homework and submissions.</p>
        <button onclick="openAssignments()">View</button>
    </div>

    <div class="card">
        <h2>Revision Tracker</h2>
        <p>Track what you've revised.</p>
        <button onclick="openRevision()">Start</button>
    </div>

    <div class="card">
        <h2>Performance</h2>
        <p>Analyze your progress.</p>
        <button onclick="openPerformance()">Check</button>
    </div>

</div>

<script>
function openTimetable() {
    alert("Timetable feature coming soon!");
}

function openAssignments() {
    alert("Assignments tracker coming soon!");
}

function openRevision() {
    alert("Revision tracker coming soon!");
}

function openPerformance() {
    alert("Performance analytics coming soon!");
}
</script>

</body>
</html>
